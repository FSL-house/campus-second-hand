server:
  port: 8080

spring:
  application:
    name: campus-second-hand-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_second_hand?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 12345
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: campusSecondHandSecretKey1234567890
  expire: 86400000

logging:
  level:
    com.campus.mapper: debug

file:
  upload-path: D:/study_Files/code/java/campus-second-hand/campus-second-hand-frontend/public/images
